<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handedness Study – Daily Activity</title>
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.2.1"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet">
  <script src="tasks.js"></script>
  <style>
    .jspsych-content { max-width: 900px; }
  </style>
</head>
<body></body>
<script>
  /*
   * URL parameters expected:
   *   PROLIFIC_PID - Prolific participant ID
   *   GROUP        - 1, 2, or 3
   *   DAY          - 0-5 (day index; displayed as Day 1-6)
   *
   * Example URL:
   *   daily.html?PROLIFIC_PID=abc123&GROUP=2&DAY=0
   *
   * For Prolific longitudinal studies, you create separate studies
   * for each day+group combination, each with the appropriate URL params.
   * Or use a single study per day with GROUP passed through.
   */

  var params = TASKS.getProlificParams();
  var group = params.group || "1";
  var dayIndex = params.day || "0";

  var jsPsych = initJsPsych({
    show_progress_bar: true,
    auto_update_progress_bar: true,
    on_finish: function () {
      // jsPsych.data.get().localSave('csv', 'handedness_daily_' + params.prolific_pid + '_day' + dayIndex + '.csv');
    }
  });

  jsPsych.data.addProperties({
    prolific_pid: params.prolific_pid,
    study_id: params.study_id,
    session_id: params.session_id,
    session: "daily",
    group: group,
    day: parseInt(dayIndex) + 1
  });

  var timeline = [];

  // Welcome
  timeline.push(
    TASKS.welcome(jsPsych, "Day " + (parseInt(dayIndex) + 1) + " — Daily Activity")
  );

  // Typing task + diary
  timeline = timeline.concat(
    TASKS.dailyTask(jsPsych, group, parseInt(dayIndex))
  );

  // Closing
  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus:
      "<h2>Day " + (parseInt(dayIndex) + 1) + " Complete</h2>" +
      "<p>Thank you! Remember to follow your instructions throughout the day.</p>" +
      (parseInt(dayIndex) < 5
        ? "<p>Please come back tomorrow for your next daily activity.</p>"
        : "<p>You have completed all 6 daily activities! " +
          "You will soon receive an invitation for Session 2.</p>"),
    choices: ["Finish"]
  });

  // Prolific completion
  timeline.push(TASKS.prolificComplete(jsPsych));

  jsPsych.run(timeline);
</script>
</html>
